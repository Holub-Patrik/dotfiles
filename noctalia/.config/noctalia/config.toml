[bar.default]
background_opacity = 0.0
center = []
concave_edge_corners = false
end = [ "tray", "clipboard", "battery" ]
font_family = "Iosevka Custom"
margin_ends = 0
radius = 4
shadow = false
start = [ "clock", "workspaces" ]
thickness = 25

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660.0

[location]
auto_locate = true

[lockscreen]
blurred_desktop = true
fingerprint = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 1081.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[shell]
font_family = "Iosevka Custom"
telemetry_enabled = true

    [shell.launcher]
    compact = true

    [shell.screenshot]
    directory = "~/Pictures/Screenshots"

    [shell.shadow]
    alpha = 0.0

[theme]
builtin = "Kanagawa"
mode = "dark"
source = "wallpaper"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "qt" ]
    community_ids = [ "discord", "zathura", "hyprtoolkit" ]

[wallpaper.default]
path = "/home/holubpat/Pictures/Wallpapers/Oled-Anime.jpg"

[wallpaper.last]
path = "/home/holubpat/Pictures/Wallpapers/Oled-Anime.jpg"

[wallpaper.monitors.eDP-1]
path = "/home/holubpat/Pictures/Wallpapers/Oled-Anime.jpg"
